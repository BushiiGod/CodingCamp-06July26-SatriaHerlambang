<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- ===== THEME TOGGLE ===== -->
  <button id="theme-toggle" class="theme-toggle" aria-label="Toggle light/dark theme">
    <span id="theme-icon">🌙</span>
  </button>

  <div class="layout">

    <!-- ===== BALANCE HEADER ===== -->
    <header class="card col-12" id="balance-section">
      <p class="balance-label">Total Spending</p>
      <h1 id="total-balance" class="balance-amount">Rp 0</h1>
      <div class="limit-row">
        <label for="limit-input" class="limit-label">Spending Limit:</label>
        <div class="limit-input-wrap">
          <span class="currency-prefix">Rp</span>
          <input type="number" id="limit-input" class="limit-input" placeholder="0" min="0" />
        </div>
        <button id="limit-set" class="btn btn-ghost btn-sm">Set Limit</button>
        <button id="limit-clear" class="btn btn-ghost btn-sm" aria-label="Clear spending limit">Clear</button>
        <span id="limit-status" class="limit-status" aria-live="polite"></span>
      </div>
    </header>

    <!-- ===== INPUT FORM ===== -->
    <section class="card col-6" id="form-section">
      <h2 class="section-title">Add Transaction</h2>
      <div class="form-group">
        <label for="item-name" class="form-label">Item Name</label>
        <input type="text" id="item-name" class="field-input" placeholder="e.g. Lunch, Bus fare…" maxlength="80" autocomplete="off" />
        <span class="field-error" id="err-name" aria-live="polite"></span>
      </div>
      <div class="form-group">
        <label for="item-amount" class="form-label">Amount (Rp)</label>
        <div class="amount-wrap">
          <span class="currency-prefix">Rp</span>
          <input type="number" id="item-amount" class="amount-input" placeholder="0" min="1" />
        </div>
        <span class="field-error" id="err-amount" aria-live="polite"></span>
      </div>
      <div class="form-group">
        <label for="item-category" class="form-label">Category</label>
        <select id="item-category" class="field-select">
          <option value="">— Select Category —</option>
          <option value="Food">🍔 Food</option>
          <option value="Transport">🚌 Transport</option>
          <option value="Fun">🎮 Fun</option>
          <option value="Custom">✏️ Custom…</option>
        </select>
        <span class="field-error" id="err-category" aria-live="polite"></span>
      </div>
      <div class="form-group hidden" id="custom-category-group">
        <label for="custom-category" class="form-label">Custom Category Name</label>
        <input type="text" id="custom-category" class="field-input" placeholder="e.g. Health, Shopping…" maxlength="40" autocomplete="off" />
        <span class="field-error" id="err-custom" aria-live="polite"></span>
      </div>
      <button id="add-btn" class="btn btn-primary btn-full">+ Add Transaction</button>
    </section>

    <!-- ===== PIE CHART ===== -->
    <section class="card col-6" id="chart-section">
      <h2 class="section-title">Spending by Category</h2>
      <div class="chart-wrap" id="chart-wrap">
        <canvas id="spending-chart" aria-label="Pie chart of spending by category" role="img"></canvas>
      </div>
      <div id="chart-empty" class="chart-empty hidden" aria-live="polite">
        <span>📊</span>
        <p>No transactions yet.<br>Add one to see your chart.</p>
      </div>
      <div id="chart-legend" class="chart-legend" aria-label="Chart legend"></div>
    </section>

    <!-- ===== TRANSACTION LIST ===== -->
    <section class="card col-12" id="list-section">
      <div class="list-header">
        <div class="list-title-wrap">
          <h2 class="section-title" style="margin-bottom:0">Transactions</h2>
          <span id="tx-count" class="tx-count"></span>
        </div>
        <div class="sort-row">
          <label for="sort-select" class="sort-label">Sort by:</label>
          <select id="sort-select" class="field-select sort-select">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
            <option value="amount-desc">Amount ↓</option>
            <option value="amount-asc">Amount ↑</option>
            <option value="category-az">Category A→Z</option>
            <option value="category-za">Category Z→A</option>
          </select>
        </div>
      </div>
      <div id="transaction-list" class="transaction-list" role="list" aria-label="Transaction list">
        <!-- items rendered by JS; empty state also injected by JS -->
      </div>
    </section>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
